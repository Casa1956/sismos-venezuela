name: Fetch Sismos
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch FUNVISIS data
        run: |
          curl -s "http://www.funvisis.gob.ve/maravilla.json" -o sismosve.json
          COUNT=$(python3 -c "import json; print(len(json.load(open('sismosve.json'))['features']))" 2>/dev/null || echo "0")
          echo "Descargados $COUNT sismos de FUNVISIS"
      - name: Validate JSON
        run: |
          python3 -c "
          import json, sys
          with open('sismosve.json') as f:
              d = json.load(f)
          if 'features' not in d:
              print('ERROR: No features key in JSON')
              sys.exit(1)
          print(f'OK: {len(d[\"features\"])} sismos validos')
          "
      - name: Commit
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add sismosve.json
          git diff --cached --quiet || git commit -m "Update FUNVISIS data $(date -u +%H:%M)" && git push origin main
